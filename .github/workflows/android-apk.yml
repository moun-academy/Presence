name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - run: npm ci
      - run: npm run android:sync
      - run: chmod +x android/gradlew
      - name: Prepare Android signing key
        shell: bash
        env:
          PRESENCE_KEYSTORE_BASE64: ${{ secrets.PRESENCE_ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$PRESENCE_KEYSTORE_BASE64"
          printf '%s' "$PRESENCE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/presence-release.jks"
      - name: Build signed Android APK
        env:
          PRESENCE_KEYSTORE_FILE: ${{ runner.temp }}/presence-release.jks
          PRESENCE_STORE_PASSWORD: ${{ secrets.PRESENCE_ANDROID_STORE_PASSWORD }}
          PRESENCE_KEY_ALIAS: presence
          PRESENCE_KEY_PASSWORD: ${{ secrets.PRESENCE_ANDROID_KEY_PASSWORD }}
        run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: presence-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
